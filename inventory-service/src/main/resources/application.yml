server:
  port: ${INVENTORY_SERVICE_PORT:8082}

spring:
  config:
    import: optional:file:./inventory-service/.env[.properties],optional:file:./.env[.properties]
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5434/inventory_db}
    username: ${INVENTORY_DB_USER:inventory}
    password: ${INVENTORY_DB_PASSWORD:inventory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:app}
    password: ${RABBITMQ_PASSWORD:app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
